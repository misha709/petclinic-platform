name: petclinic
services:
  gateway:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./backend/gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - petclinic-network
    depends_on:
      owners-api:
        condition: service_started
      pets-api:
        condition: service_started
      vets-api:
        condition: service_started
      visits-api:
        condition: service_started
      notifications-api:
        condition: service_started
      web:
        condition: service_started

  owners-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petclinic_owners
    ports:
      - "5432:5432"
    volumes:
      - owners-pgdata:/var/lib/postgresql/data
    networks:
      - petclinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  owners-api:
    build:
      context: .
      dockerfile: backend/owners/PetClinic.Owners.Api/Dockerfile
    environment:
      ConnectionStrings__OwnersDb: "Host=owners-db;Port=5432;Database=petclinic_owners;Username=postgres;Password=postgres"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5080:8080"
    networks:
      - petclinic-network
    depends_on:
      owners-db:
        condition: service_healthy

  pets-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petclinic_pets
    ports:
      - "5433:5432"
    volumes:
      - pets-pgdata:/var/lib/postgresql/data
    networks:
      - petclinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pets-api:
    build:
      context: .
      dockerfile: backend/pets/PetClinic.Pets.Api/Dockerfile
    environment:
      ConnectionStrings__PetsDb: "Host=pets-db;Port=5432;Database=petclinic_pets;Username=postgres;Password=postgres"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5081:8080"
    networks:
      - petclinic-network
    depends_on:
      pets-db:
        condition: service_healthy

  vets-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petclinic_vets
    ports:
      - "5434:5432"
    volumes:
      - vets-pgdata:/var/lib/postgresql/data
    networks:
      - petclinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  vets-api:
    build:
      context: .
      dockerfile: backend/vets/PetClinic.Vets.Api/Dockerfile
    environment:
      ConnectionStrings__VetsDb: "Host=vets-db;Port=5432;Database=petclinic_vets;Username=postgres;Password=postgres"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5082:8080"
    networks:
      - petclinic-network
    depends_on:
      vets-db:
        condition: service_healthy

  visits-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petclinic_visits
    ports:
      - "5435:5432"
    volumes:
      - visits-pgdata:/var/lib/postgresql/data
    networks:
      - petclinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,sns
      DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - petclinic-network

  visits-api:
    build:
      context: .
      dockerfile: backend/visits/PetClinic.Visits.Api/Dockerfile
    environment:
      ConnectionStrings__VisitsDb: "Host=visits-db;Port=5432;Database=petclinic_visits;Username=postgres;Password=postgres"
      ASPNETCORE_URLS: "http://+:8080"
      AwsMessaging__Region: "eu-west-1"
      AwsMessaging__ServiceUrl: "http://localstack:4566"
      AwsMessaging__AccessKey: "test"
      AwsMessaging__SecretKey: "test"
    ports:
      - "5083:8080"
    networks:
      - petclinic-network
    depends_on:
      visits-db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  notifications-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petclinic_notifications
    ports:
      - "5436:5432"
    volumes:
      - notifications-pgdata:/var/lib/postgresql/data
    networks:
      - petclinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  notifications-api:
    build:
      context: .
      dockerfile: backend/notifications/PetClinic.Notifications.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      AwsMessaging__Region: "eu-west-1"
      AwsMessaging__ServiceUrl: "http://localstack:4566"
      AwsMessaging__AccessKey: "test"
      AwsMessaging__SecretKey: "test"
      Services__PetsApi: "http://pets-api:8080"
      Services__OwnersApi: "http://owners-api:8080"
      Smtp__Host: "mailpit"
      Smtp__Port: "1025"
      Smtp__FromAddress: "noreply@petclinic.local"
      Smtp__FromName: "PetClinic"
      Smtp__UseSsl: "false"
    ports:
      - "5084:8080"
    networks:
      - petclinic-network
    depends_on:
      localstack:
        condition: service_healthy
      owners-api:
        condition: service_started
      pets-api:
        condition: service_started

  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    networks:
      - petclinic-network

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - petclinic-network

networks:
  petclinic-network:
    driver: bridge

volumes:
  owners-pgdata:
  pets-pgdata:
  vets-pgdata:
  visits-pgdata:
  notifications-pgdata:
  localstack_data:
