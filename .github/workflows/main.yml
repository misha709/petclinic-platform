name: Main Pipeline

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            owners:
              - 'src/backend/owners/**'
            pets:
              - 'src/backend/pets/**'
            vets:
              - 'src/backend/vets/**'
            visits:
              - 'src/backend/visits/**'
            notifications:
              - 'src/backend/notifications/**'
            web:
              - 'src/frontend/web/**'

  tag-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - id: version
        run: echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push changed services
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ECR_PREFIX=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          DB_SERVICES="owners pets vets visits"
          for SERVICE in $(echo '${{ needs.detect-changes.outputs.services }}' | jq -r '.[]'); do
            if [ "$SERVICE" = "web" ]; then
              DOCKERFILE="src/frontend/web/Dockerfile"
              BUILD_CONTEXT="src/frontend/web"
              TARGET="final"
            else
              DOCKERFILE=$(find src/backend/$SERVICE -name Dockerfile 2>/dev/null | head -1)
              BUILD_CONTEXT="src/"
              TARGET="final"
            fi
            if [ -z "$DOCKERFILE" ] || [ ! -f "$DOCKERFILE" ]; then
              echo "No Dockerfile found for $SERVICE – skipping image build"
              continue
            fi
            IMAGE=$ECR_PREFIX/petclinic/$SERVICE
            docker build -f "$DOCKERFILE" --target $TARGET -t "$IMAGE:$VERSION" $BUILD_CONTEXT
            docker push "$IMAGE:$VERSION"
            if echo "$DB_SERVICES" | grep -qw "$SERVICE"; then
              MIGRATE_IMAGE=$ECR_PREFIX/petclinic/$SERVICE-migrate
              docker build -f "$DOCKERFILE" --target migrate -t "$MIGRATE_IMAGE:$VERSION" $BUILD_CONTEXT
              docker push "$MIGRATE_IMAGE:$VERSION"
            fi
          done

  update-infra-values:
    needs: [detect-changes, tag-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ vars.INFRA_REPO_URL }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update image tags for changed services only
        run: |
          VERSION=${{ needs.tag-and-push.outputs.version }}
          for SERVICE in $(echo '${{ needs.detect-changes.outputs.services }}' | jq -r '.[]'); do
            yq e ".images.$SERVICE.tag = \"$VERSION\"" -i helm/petclinic/values.yaml
          done
          git config user.email "ci@petclinic.local"
          git config user.name "CI Bot"
          git add helm/petclinic/values.yaml
          git commit -m "chore: bump ${{ needs.detect-changes.outputs.services }} to ${{ needs.tag-and-push.outputs.version }}"
          git push
