name: PR Pipeline

on:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            owners:
              - 'src/backend/owners/**'
            pets:
              - 'src/backend/pets/**'
            vets:
              - 'src/backend/vets/**'
            visits:
              - 'src/backend/visits/**'
            notifications:
              - 'src/backend/notifications/**'
            web:
              - 'src/frontend/web/**'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore src/
      - name: Build ${{ matrix.service }}
        run: |
          SERVICE="${{ matrix.service }}"
          dotnet build src/backend/$SERVICE/PetClinic.${SERVICE^}.Api/ --configuration Release --no-restore
      - name: Test ${{ matrix.service }}
        run: |
          SERVICE="${{ matrix.service }}"
          dotnet test src/backend/$SERVICE/PetClinic.${SERVICE^}.Tests/ --configuration Release --verbosity normal

  build-web:
    needs: detect-changes
    if: contains(fromJson(needs.detect-changes.outputs.services), 'web')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/frontend/web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: src/frontend/web
      - name: Lint
        run: npm run lint
        working-directory: src/frontend/web
      - name: Build
        run: npm run build
        working-directory: src/frontend/web

  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: SonarCloud Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"${{ vars.SONAR_PROJECT_KEY }}" /o:"${{ vars.SONAR_ORG }}" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io"
          dotnet build src/ --configuration Release
          dotnet test src/ --configuration Release --no-build --logger trx --collect:"XPlat Code Coverage"
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
