name: PR Pipeline
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - run: dotnet test src/ --configuration Release

  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
      - name: SonarQube Scan
        env: { SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} }
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"petclinic-platform" /o:"<org>" \
            /d:sonar.token=$SONAR_TOKEN /d:sonar.host.url=https://sonarcloud.io
          dotnet build src/
          dotnet sonarscanner end /d:sonar.token=$SONAR_TOKEN

  build-push:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [owners, pets, vets, visits, notifications, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/petclinic/${{ matrix.service }}
          docker build -f src/backend/${{ matrix.service }}/PetClinic.*/Dockerfile \
            -t $IMAGE:sha-${{ github.sha }} src/
          docker push $IMAGE:sha-${{ github.sha }}