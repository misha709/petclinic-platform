name: PR Pipeline

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test src/ --configuration Release

  sonar:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"petclinic-platform" /o:"<org>" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io"
          dotnet build src/
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  docker-build:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [owners, pets, vets, visits, notifications, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          IMAGE=petclinic/${{ matrix.service }}
          docker build \
            -f src/backend/${{ matrix.service }}/Dockerfile \
            -t $IMAGE:sha-${{ github.sha }} \
            src/